<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Game</title>

<style>

/* ===== RESET FULL ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;

    background: radial-gradient(circle at top, #020617, #000814);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== HEADER ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px;
}

.title {
    font-size: 32px;
    font-weight: bold;
}

.title span {
    color: #22d3ee;
}

.time-box {
    border: 1px solid #22d3ee;
    padding: 10px 20px;
    border-radius: 10px;
    color: #67e8f9;
}

/* ===== SEARCH ===== */
.search-box {
    padding: 0 30px;
}

input {
    padding: 10px;
    width: 300px;
    border-radius: 8px;
    border: none;
}

/* ===== LAYOUT ===== */
.wrapper {
    display: flex;
    height: calc(100vh - 120px);
}

/* LEFT */
.left {
    width: 100%;
    overflow-y: auto;
    transition: 0.3s;
}

.left.shrink {
    width: 65%;
}

/* RIGHT */
.right {
    width: 0;
    overflow: hidden;
    transition: 0.3s;
}

.right.show {
    width: 35%;
    padding: 20px;
}

/* ===== TABLE ===== */
.container {
    margin: 20px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(34,211,238,0.2);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 16px;
    text-align: center;
}

thead {
    background: #0f172a;
}

tr:hover {
    background: rgba(255,255,255,0.05);
}

/* PLAYER */
.player {
    display: flex;
    align-items: center;
    gap: 10px;
}

.avatar {
    width: 45px;
    border-radius: 50%;
    border: 2px solid #22d3ee;
}

/* PROFILE */
.profile {
    background: #0f172a;
    padding: 20px;
    border-radius: 16px;
    height: 100%;
}

.profile-header {
    text-align: center;
}

.profile-avatar {
    width: 80px;
    border-radius: 50%;
    border: 3px solid #22d3ee;
}

.profile-row {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
}

/* COLORS */
.kill { color: gold; }
.power { color: cyan; }
.death { color: red; }

</style>
</head>

<body>

<div class="header">
    <div class="title">🏆 BẢNG XẾP HẠNG <span>TỔNG HỢP</span></div>
    <div class="time-box">24/05/2025</div>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="🔍 Tìm player..." onkeyup="searchPlayer()">
</div>

<div class="wrapper">

<!-- LEFT -->
<div id="left" class="left">

<div class="container">
<table>
<thead>
<tr>
<th>#</th>
<th>Tên</th>
<th>ID</th>
<th>Liên minh</th>
<th>Kill</th>
<th>Power</th>
<th>Death</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td class="player">
<img src="https://api.dicebear.com/7.x/bottts/svg?seed=VICTORIUS" class="avatar">
VICTORIUS
</td>
<td>ID-0001</td>
<td>LEGENDS</td>
<td class="kill">125M</td>
<td class="power">129M</td>
<td class="death">12K</td>
</tr>

</tbody>
</table>
</div>

</div>

<!-- RIGHT -->
<div id="right" class="right">
<div id="profile" class="profile"></div>
</div>

</div>

<script>

function searchPlayer() {
    let input = document.getElementById("search").value.toLowerCase();
    let right = document.getElementById("right");
    let left = document.getElementById("left");
    let profile = document.getElementById("profile");

    if (input === "victorius") {

        profile.innerHTML = `
        <div class="profile-header">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=VICTORIUS" class="profile-avatar">
            <h2>VICTORIUS</h2>
            <p>🏆 Rank #1</p>
        </div>

        <div class="profile-row"><span>ID</span><span>ID-0001</span></div>
        <div class="profile-row"><span>Alliance</span><span>LEGENDS</span></div>
        <div class="profile-row kill"><span>Kill</span><span>125M</span></div>
        <div class="profile-row power"><span>Power</span><span>129M</span></div>
        <div class="profile-row death"><span>Death</span><span>12K</span></div>
        `;

        right.classList.add("show");
        left.classList.add("shrink");

    } else {
        right.classList.remove("show");
        left.classList.remove("shrink");
    }
}

</script>

</body>
</html>
