<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>

/* ===== FULL SCREEN ===== */
body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at top, #020617, #000814);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
}

.title { font-size: 32px; font-weight: bold; }
.title span { color: #22d3ee; }
.subtitle { color: #94a3b8; }

/* SEARCH */
.search-box { padding: 0 30px; margin-bottom: 10px; }

input {
    padding: 10px;
    width: 300px;
    border-radius: 8px;
    border: none;
}

/* LAYOUT */
.wrapper {
    display: flex;
    width: 100vw;
    height: calc(100vh - 100px);
}

.left {
    width: 100%;
    overflow-y: auto;
    transition: 0.3s;
}

/* TABLE */
.container {
    margin: 20px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(34,211,238,0.2);
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

thead {
    background: linear-gradient(90deg, #020617, #0f172a);
}

th {
    padding: 16px;
    font-size: 13px;
    color: #94a3b8;
}

td {
    padding: 16px;
    text-align: center;
}

tr {
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* PLAYER */
.player {
    display: flex;
    align-items: center;
    gap: 10px;
}

.avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #22d3ee;
}

/* COLORS */
.kill { color: #facc15; }
.power { color: #22d3ee; }
.death { color: #ef4444; }

.t1 { color: #ef4444; }
.t2 { color: #a855f7; }
.t3 { color: #3b82f6; }
.t4 { color: #22c55e; }
.t5 { color: #f59e0b; }

/* DIFF */
.diff {
    font-size: 11px;
    display: block;
    margin-top: 4px;
    color: #22c55e;
}

</style>
</head>

<body>

<div class="header">
    <div>
        <div class="title">🏆 BẢNG XẾP HẠNG <span>TỔNG HỢP</span></div>
        <div class="subtitle">So sánh dữ liệu người chơi</div>
    </div>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="🔍 Tìm player...">
</div>

<div class="wrapper">

<div class="left">

<div class="container">
<table>
<thead>
<tr>
<th>#</th>
<th>Tên</th>
<th>ID</th>
<th>Liên minh</th>
<th>Kill</th>
<th>Power</th>
<th>T1</th>
<th>T2</th>
<th>T3</th>
<th>T4</th>
<th>T5</th>
<th>Death</th>
</tr>
</thead>

<tbody id="table-body">
</tbody>

</table>
</div>

</div>

</div>

<script>

// ===== LINK GOOGLE SHEET =====
const OLD = "https://docs.google.com/spreadsheets/d/1MJQSE3siwFWmQNdJmbbJ6RsilvcoxWTu-r6h-UdHugE/gviz/tq?tqx=out:json&gid=731741617";
const NEW = "https://docs.google.com/spreadsheets/d/1MJQSE3siwFWmQNdJmbbJ6RsilvcoxWTu-r6h-UdHugE/gviz/tq?tqx=out:json&gid=371969335";

// ===== LẤY DATA =====
async function getData(url){
    let res = await fetch(url);
    let text = await res.text();
    let json = JSON.parse(text.substring(47).slice(0,-2));
    return json.table.rows;
}

// ===== LOAD + SO SÁNH =====
async function load(){

    let oldData = await getData(OLD);
    let newData = await getData(NEW);

    let oldMap = {};

    // map dữ liệu cũ theo ID
    oldData.forEach(r=>{
        let id = r.c[1]?.v;
        oldMap[id] = r.c;
    });

    let tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    newData.forEach((r,i)=>{

        let c = r.c;

        let name = c[0]?.v || "";
        let id = c[1]?.v || "";
        let alliance = c[2]?.v || "";

        let kill = Number(c[3]?.v || 0);
        let power = Number(c[4]?.v || 0);

        let t1 = c[5]?.v || "";
        let t2 = c[6]?.v || "";
        let t3 = c[7]?.v || "";
        let t4 = c[8]?.v || "";
        let t5 = c[9]?.v || "";
        let death = c[10]?.v || "";

        let old = oldMap[id];

        let kill_old = old ? Number(old[3]?.v || 0) : 0;
        let power_old = old ? Number(old[4]?.v || 0) : 0;

        let kill_diff = kill - kill_old;
        let power_diff = power - power_old;

        tbody.innerHTML += `
        <tr>
            <td>${i+1}</td>

            <td>
                <div class="player">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${name}" class="avatar">
                    ${name}
                </div>
            </td>

            <td>${id}</td>
            <td>${alliance}</td>

            <td class="kill">
                ${kill.toLocaleString()}
                <span class="diff">+${kill_diff.toLocaleString()}</span>
            </td>

            <td class="power">
                ${power.toLocaleString()}
                <span class="diff">+${power_diff.toLocaleString()}</span>
            </td>

            <td class="t1">${t1}</td>
            <td class="t2">${t2}</td>
            <td class="t3">${t3}</td>
            <td class="t4">${t4}</td>
            <td class="t5">${t5}</td>

            <td class="death">${death}</td>
        </tr>
        `;
    });
}

// load lần đầu
load();

// auto update 5s
setInterval(load, 5000);

</script>

</body>
</html>
