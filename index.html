<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>

/* ===== FULL SCREEN ===== */
body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at top, #020617, #000814);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
}

.title { font-size: 32px; font-weight: bold; }
.title span { color: #22d3ee; }
.subtitle { color: #94a3b8; }

/* SEARCH */
.search-box { padding: 0 30px; margin-bottom: 10px; }

input {
    padding: 10px;
    width: 300px;
    border-radius: 8px;
    border: none;
}

/* LAYOUT */
.wrapper {
    display: flex;
    width: 100vw;
    height: calc(100vh - 100px);
}

.left {
    width: 100%;
    overflow-y: auto;
    transition: 0.3s;
}

/* TABLE */
.container {
    margin: 20px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(34,211,238,0.2);
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

thead {
    background: linear-gradient(90deg, #020617, #0f172a);
}

th {
    padding: 16px;
    font-size: 13px;
    color: #94a3b8;
}

td {
    padding: 16px;
    text-align: center;
}

tr {
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* PLAYER */
.player {
    display: flex;
    align-items: center;
    gap: 10px;
}

.avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #22d3ee;
}

/* COLORS */
.kill { color: #facc15; }
.power { color: #22d3ee; }
.death { color: #ef4444; }

.t1 { color: #ef4444; }
.t2 { color: #a855f7; }
.t3 { color: #3b82f6; }
.t4 { color: #22c55e; }
.t5 { color: #f59e0b; }

/* DIFF */
.diff {
    font-size: 11px;
    display: block;
    margin-top: 4px;
    color: #22c55e;
}

</style>
</head>

<body>

<div class="header">
    <div>
        <div class="title">🏆 BẢNG XẾP HẠNG <span>TỔNG HỢP</span></div>
        <div class="subtitle">So sánh dữ liệu người chơi</div>
    </div>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="🔍 Tìm player...">
</div>

<div class="wrapper">

<div class="left">

<div class="container">
<table>
<thead>
<tr>
<th>#</th>
<th>Tên</th>
<th>ID</th>
<th>Liên minh</th>
<th>Kill</th>
<th>Power</th>
<th>T1</th>
<th>T2</th>
<th>T3</th>
<th>T4</th>
<th>T5</th>
<th>Death</th>
</tr>
</thead>

<tbody id="table-body">
</tbody>

</table>
</div>

</div>

</div>

<script>

const SHEET_BEFORE = "https://docs.google.com/spreadsheets/d/1MJQSE3siwFWmQNdJmbbJ6RsilvcoxWTu-r6h-UdHugE/gviz/tq?tqx=out:csv&gid=731741617";
const SHEET_AFTER  = "https://docs.google.com/spreadsheets/d/1MJQSE3siwFWmQNdJmbbJ6RsilvcoxWTu-r6h-UdHugE/gviz/tq?tqx=out:csv&gid=371969335";

let players = {};

async function loadData() {

    const before = await fetch(SHEET_BEFORE).then(r => r.text());
    const after  = await fetch(SHEET_AFTER).then(r => r.text());

    const parse = (csv) => csv.split("\n").slice(1).map(r => r.split(","));

    let beforeData = parse(before);
    let afterData  = parse(after);

    afterData.forEach(row => {

        let name = row[1].toLowerCase();

        players[name] = {
            name: row[1],
            id: row[2],
            alliance: row[3],
            kill: row[4],
            power: row[5],
            t1: row[6],
            t2: row[7],
            t3: row[8],
            t4: row[9],
            t5: row[10],
            death: row[11]
        };

    });

    console.log("DATA LOADED:", players);
}

loadData();

function searchPlayer() {
    let input = document.getElementById("search").value.toLowerCase();
    let right = document.getElementById("right");
    let left = document.getElementById("left");
    let profile = document.getElementById("profile");

    if (players[input]) {

        let p = players[input];

        profile.innerHTML = `
        <div class="profile-header">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${p.name}" class="profile-avatar">
            <h2>${p.name}</h2>
            <div class="profile-level">Lv.??</div>
            <h3>🏆 Rank</h3>
        </div>

        <div class="profile-row"><span>🆔 ID</span><span>${p.id}</span></div>
        <div class="profile-row"><span>🏰 Liên minh</span><span>${p.alliance}</span></div>

        <div class="profile-row kill"><span>⚔ Tổng</span><span>${p.kill}</span></div>
        <div class="profile-row power"><span>⚡ Sức mạnh</span><span>${p.power}</span></div>

        <div class="profile-row t1"><span>T1</span><span>${p.t1}</span></div>
        <div class="profile-row t2"><span>T2</span><span>${p.t2}</span></div>
        <div class="profile-row t3"><span>T3</span><span>${p.t3}</span></div>
        <div class="profile-row t4"><span>T4</span><span>${p.t4}</span></div>
        <div class="profile-row t5"><span>T5</span><span>${p.t5}</span></div>

        <div class="profile-row death"><span>💀 Death</span><span>${p.death}</span></div>
        `;

        right.classList.add("show");
        left.classList.add("shrink");

    } else {
        right.classList.remove("show");
        left.classList.remove("shrink");
    }
}

</script>

</body>
</html>
